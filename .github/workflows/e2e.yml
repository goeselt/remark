---
name: End-to-End

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  e2e:
    name: End-to-End
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      # -- 1. Upsert: create initial comment with one H1 section -------------------------------------------------------
      - id: upsert-init
        name: Upsert - Create (Tests H1)
        uses: ./
        with:
          comment-key: e2e-main
          body: |
            # Tests

            Initial results.

      - name: Verify - Root marker, section markers, footer, outputs
        env:
          COMMENT_ID: ${{ steps.upsert-init.outputs.comment-id }}
          COMMENT_URL: ${{ steps.upsert-init.outputs.comment-url }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          echo "$body" | grep -qF '<!-- remark:e2e-main -->'  || { printf 'FAIL: root marker missing\n';        exit 1; }
          echo "$body" | grep -qF '<!-- section:tests -->'    || { printf 'FAIL: section open tag missing\n';   exit 1; }
          echo "$body" | grep -qF '<!-- /section:tests -->'   || { printf 'FAIL: section close tag missing\n';  exit 1; }
          echo "$body" | grep -qF '# Tests'                   || { printf 'FAIL: H1 heading missing\n';         exit 1; }
          echo "$body" | grep -qF 'Initial results'           || { printf 'FAIL: body content missing\n';       exit 1; }
          echo "$body" | grep -qF 'Generated by Remark'       || { printf 'FAIL: footer missing\n';             exit 1; }
          echo "$COMMENT_URL" | grep -qF 'issuecomment'       || { printf 'FAIL: comment-url invalid\n';        exit 1; }
          printf 'PASS\n'

      # -- 2. Sibling merge: add Lint H1, Tests must survive -----------------------------------------------------------
      - id: upsert-sibling
        name: Upsert - Add Lint H1 (sibling merge)
        uses: ./
        with:
          comment-key: e2e-main
          body: |
            # Lint

            No issues.

      - name: Verify - Both H1 sections present
        env:
          COMMENT_ID: ${{ steps.upsert-sibling.outputs.comment-id }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          echo "$body" | grep -qF '# Tests'        || { printf 'FAIL: Tests sibling lost\n';    exit 1; }
          echo "$body" | grep -qF 'Initial results' || { printf 'FAIL: Tests content lost\n';   exit 1; }
          echo "$body" | grep -qF '# Lint'          || { printf 'FAIL: Lint section missing\n'; exit 1; }
          echo "$body" | grep -qF 'No issues'       || { printf 'FAIL: Lint content missing\n'; exit 1; }
          printf 'PASS\n'

      # -- 3. Section update: replace Tests H1, Lint H1 preserved ------------------------------------------------------
      - id: upsert-update
        name: Upsert - Update Tests H1
        uses: ./
        with:
          comment-key: e2e-main
          body: |
            # Tests

            Updated results.

      - name: Verify - Tests updated, Lint unchanged
        env:
          COMMENT_ID: ${{ steps.upsert-update.outputs.comment-id }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          echo "$body" | grep -qF 'Updated results' || { printf 'FAIL: Tests not updated\n';         exit 1; }
          if echo "$body" | grep -qF 'Initial results'; then
            printf 'FAIL: old Tests content still present\n'; exit 1
          fi
          echo "$body" | grep -qF '# Lint'    || { printf 'FAIL: Lint sibling lost\n';    exit 1; }
          echo "$body" | grep -qF 'No issues' || { printf 'FAIL: Lint content changed\n'; exit 1; }
          printf 'PASS\n'

      # -- 4. H2 subsection: add nested heading under Tests ------------------------------------------------------------
      - id: upsert-h2-add
        name: Upsert - Add H2 Subsection under Tests
        uses: ./
        with:
          comment-key: e2e-main
          body: |
            # Tests

            Parent text.

            ## Failed Jobs

            Job details.

      - name: Verify - H2 stored inside H1 section, no own section markers
        env:
          COMMENT_ID: ${{ steps.upsert-h2-add.outputs.comment-id }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          echo "$body" | grep -qF '## Failed Jobs' || { printf 'FAIL: H2 heading missing\n'; exit 1; }
          echo "$body" | grep -qF 'Job details'    || { printf 'FAIL: H2 content missing\n'; exit 1; }
          echo "$body" | grep -qF '# Lint'         || { printf 'FAIL: Lint sibling lost\n';  exit 1; }
          if echo "$body" | grep -qF '<!-- section:failed-jobs -->'; then
            printf 'FAIL: H2 must not get its own section markers\n'; exit 1
          fi
          printf 'PASS\n'

      # -- 5. H2 deletion: replace H1 without H2, nested heading removed -----------------------------------------------
      - id: upsert-h2-del
        name: Upsert - Replace Tests H1 Without H2 (deletes subsection)
        uses: ./
        with:
          comment-key: e2e-main
          body: |
            # Tests

            All passed.

      - name: Verify - H2 deleted, Lint sibling intact
        env:
          COMMENT_ID: ${{ steps.upsert-h2-del.outputs.comment-id }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          if echo "$body" | grep -qF '## Failed Jobs'; then
            printf 'FAIL: H2 subsection should have been deleted with parent\n'; exit 1
          fi
          echo "$body" | grep -qF 'All passed' || { printf 'FAIL: updated Tests content missing\n'; exit 1; }
          echo "$body" | grep -qF '# Lint'     || { printf 'FAIL: Lint sibling lost\n';             exit 1; }
          printf 'PASS\n'

      # -- 6. No-H1 body: replaces whole comment, no section markers written -------------------------------------------
      - id: upsert-no-h1
        name: Upsert - No-H1 Body (whole-body replacement)
        uses: ./
        with:
          comment-key: e2e-main
          body: |
            All jobs skipped. Nothing to report.

      - name: Verify - Raw body stored, no section markers
        env:
          COMMENT_ID: ${{ steps.upsert-no-h1.outputs.comment-id }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          echo "$body" | grep -qF 'All jobs skipped'          || { printf 'FAIL: body content missing\n';    exit 1; }
          echo "$body" | grep -qF '<!-- remark:e2e-main -->'  || { printf 'FAIL: root marker missing\n';     exit 1; }
          if echo "$body" | grep -qF '<!-- section:'; then
            printf 'FAIL: section markers must not appear in no-H1 mode\n'; exit 1
          fi
          if echo "$body" | grep -qF '# Tests'; then
            printf 'FAIL: previous H1 sections should have been replaced\n'; exit 1
          fi
          printf 'PASS\n'

      # -- 7. skip-unchanged: identical content --> comment not rewritten ----------------------------------------------
      - id: skip-same
        name: Skip-Unchanged - Same Content (no-op)
        uses: ./
        with:
          comment-key: e2e-main
          skip-unchanged: 'true'
          body: |
            All jobs skipped. Nothing to report.

      - name: Verify - comment-id unchanged
        env:
          ID_BEFORE: ${{ steps.upsert-no-h1.outputs.comment-id }}
          ID_AFTER: ${{ steps.skip-same.outputs.comment-id }}
        run: |
          [ "$ID_BEFORE" = "$ID_AFTER" ] || { printf 'FAIL: comment-id changed despite identical content\n'; exit 1; }
          printf 'PASS\n'

      # -- 8. skip-unchanged: changed content --> writes ---------------------------------------------------------------
      - id: skip-changed
        name: Skip-Unchanged - Changed Content (writes)
        uses: ./
        with:
          comment-key: e2e-main
          skip-unchanged: 'true'
          body: |
            Changed content.

      - name: Verify - Comment updated despite skip-unchanged
        env:
          COMMENT_ID: ${{ steps.skip-changed.outputs.comment-id }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          echo "$body" | grep -qF 'Changed content' || { printf 'FAIL: changed content not written\n'; exit 1; }
          printf 'PASS\n'

      # -- 9. body-file: post content from a workspace file ------------------------------------------------------------
      - name: Write Body File
        run: |
          cat > "$GITHUB_WORKSPACE/e2e-coverage.md" <<'MARKDOWN'
          # Coverage

          Line coverage: 98%.
          MARKDOWN

      - id: body-file
        name: Body-File - Post from File
        uses: ./
        with:
          comment-key: e2e-file
          body-file: e2e-coverage.md

      - name: Verify - File content in independent comment
        env:
          COMMENT_ID: ${{ steps.body-file.outputs.comment-id }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          echo "$body" | grep -qF '# Coverage'              || { printf 'FAIL: H1 from file missing\n';    exit 1; }
          echo "$body" | grep -qF 'Line coverage: 98%'      || { printf 'FAIL: file content missing\n';    exit 1; }
          echo "$body" | grep -qF '<!-- remark:e2e-file -->' || { printf 'FAIL: wrong root marker\n';      exit 1; }
          printf 'PASS\n'

      # -- 10. mode: create -- always posts a new comment --------------------------------------------------------------
      - id: create-1
        name: Create Mode - First Post
        uses: ./
        with:
          comment-key: e2e-create
          mode: create
          body: |
            Deployment 1.

      - id: create-2
        name: Create Mode - Second Post (must be new)
        uses: ./
        with:
          comment-key: e2e-create
          mode: create
          body: |
            Deployment 2.

      - name: Verify - Two distinct comments created
        env:
          ID_1: ${{ steps.create-1.outputs.comment-id }}
          ID_2: ${{ steps.create-2.outputs.comment-id }}
        run: |
          [ "$ID_1" != "$ID_2" ] || { printf 'FAIL: create mode produced the same comment-id twice\n'; exit 1; }
          body1=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$ID_1" --jq '.body')
          body2=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$ID_2" --jq '.body')
          echo "$body1" | grep -qF 'Deployment 1' || { printf 'FAIL: first comment content wrong\n';  exit 1; }
          echo "$body2" | grep -qF 'Deployment 2' || { printf 'FAIL: second comment content wrong\n'; exit 1; }
          printf 'PASS\n'

      # -- 11. comment-key isolation: independent comments per key -----------------------------------------------------
      - id: key-a
        name: Comment-Key A
        uses: ./
        with:
          comment-key: e2e-key-a
          body: |
            Key A content.

      - id: key-b
        name: Comment-Key B
        uses: ./
        with:
          comment-key: e2e-key-b
          body: |
            Key B content.

      - name: Verify - Keys produce independent comments with correct markers
        env:
          ID_A: ${{ steps.key-a.outputs.comment-id }}
          ID_B: ${{ steps.key-b.outputs.comment-id }}
        run: |
          [ "$ID_A" != "$ID_B" ] || { printf 'FAIL: different keys produced the same comment\n'; exit 1; }
          body_a=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$ID_A" --jq '.body')
          body_b=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$ID_B" --jq '.body')
          echo "$body_a" | grep -qF '<!-- remark:e2e-key-a -->' || { printf 'FAIL: key-a root marker wrong\n'; exit 1; }
          echo "$body_b" | grep -qF '<!-- remark:e2e-key-b -->' || { printf 'FAIL: key-b root marker wrong\n'; exit 1; }
          if echo "$body_a" | grep -qF 'Key B content'; then printf 'FAIL: key-a contains key-b content\n'; exit 1; fi
          if echo "$body_b" | grep -qF 'Key A content'; then printf 'FAIL: key-b contains key-a content\n'; exit 1; fi
          printf 'PASS\n'

      # -- 12. Explicit pr-number input --------------------------------------------------------------------------------
      - id: explicit-pr
        name: PR-Number - Explicit Input
        uses: ./
        with:
          comment-key: e2e-explicit-pr
          pr-number: ${{ github.event.pull_request.number }}
          body: |
            Explicit pr-number works.

      - name: Verify - Explicit pr-number comment posted
        env:
          COMMENT_ID: ${{ steps.explicit-pr.outputs.comment-id }}
        run: |
          body=$(gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" --jq '.body')
          printf '%s\n' "$body"
          echo "$body" | grep -qF 'Explicit pr-number works' || { printf 'FAIL: content missing\n'; exit 1; }
          printf 'PASS\n'
