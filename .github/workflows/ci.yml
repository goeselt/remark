---
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate Intent
        uses: goeselt/intent@21b70d0a25a0aae8002ca2c7fb4f4b3ba604922e # v1.1.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-comment: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run Tests
        run: npm test

      - name: Pedant
        id: pedant
        continue-on-error: true
        uses: goeselt/pedant@a62f5beea373a55846791c2113ceacd07f114826 # v1.2.2
        with:
          summary-github-step: true

      - name: Publish Pedant Report
        if: always()
        uses: ./
        with:
          body: ${{ steps.pedant.outputs.summary }}
          comment-key: pedant
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-unchanged: true

      - name: Fail On Pedant Findings
        if: steps.pedant.outcome != 'success'
        run: exit 1
